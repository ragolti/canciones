<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Proyección</title>
    <style>
        html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
        body { cursor: none; }

        /* Capa de fondo (color, imagen o animado) */
        #fondo {
            position: fixed;
            inset: 0;
            background: #000;
            background-size: cover;
            background-position: center;
            z-index: 0;
        }
        #fondo.animado {
            background: linear-gradient(-45deg, #1a0d3d, #3a1f7a, #0d2a4d, #1f6b7a);
            background-size: 400% 400%;
            animation: mover 18s ease infinite;
        }
        @keyframes mover {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Video de fondo */
        #video-fondo {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            display: none;
        }
        /* Capa oscura para que la letra se lea sobre imágenes/videos */
        #oscurecer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1;
            display: none;
        }
        .con-imagen #oscurecer { display: block; }

        #texto {
            position: relative;
            z-index: 2;
            color: #fff;
            font-family: "Segoe UI", Arial, sans-serif;
            font-weight: 600;
            font-size: 4.5vw;
            line-height: 1.4;
            text-align: center;
            white-space: pre-wrap;
            padding: 4vh 6vw;
            text-shadow: 0 2px 14px rgba(0,0,0,0.8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pista {
            position: fixed;
            bottom: 12px;
            width: 100%;
            text-align: center;
            color: #777;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 3;
            cursor: default;
        }
    </style>
</head>
<body>
    <div id="fondo"></div>
    <video id="video-fondo" autoplay muted loop playsinline></video>
    <div id="oscurecer"></div>
    <div id="texto"></div>
    <div class="pista" id="pista">Esperando la pantalla de control… (poné esta ventana en la pantalla gigante y presioná F11 para pantalla completa)</div>

    <script>
        const canal = new BroadcastChannel("adoremos_proyeccion");
        const elTexto = document.getElementById("texto");
        const elPista = document.getElementById("pista");
        const elFondo = document.getElementById("fondo");
        const elVideo = document.getElementById("video-fondo");

        function aplicarFondo(f) {
            if (!f) return;
            // Reset
            elFondo.className = "";
            elFondo.style.backgroundImage = "";
            elFondo.style.background = "";
            elVideo.style.display = "none";
            elVideo.pause();
            document.body.classList.remove("con-imagen");

            if (f.tipo === "color") {
                elFondo.style.background = f.valor;
            } else if (f.tipo === "animado") {
                elFondo.className = "animado";
            } else if (f.tipo === "imagen") {
                elFondo.style.backgroundImage = "url('" + f.valor + "')";
                document.body.classList.add("con-imagen");
            } else if (f.tipo === "video") {
                elVideo.src = f.valor;
                elVideo.style.display = "block";
                elVideo.play().catch(function () {});
                document.body.classList.add("con-imagen");
            }
        }

        canal.onmessage = function (e) {
            const d = e.data || {};
            if (d.texto !== undefined) {
                elTexto.textContent = d.texto || "";
                elPista.style.display = "none";
            }
            if (d.fondo) aplicarFondo(d.fondo);
        };

        // Al abrir, pide al control el estado actual (texto + fondo).
        canal.postMessage({ hola: true });
    </script>
</body>
</html>
