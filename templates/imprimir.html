<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>{{ cancion['titulo'] }}</title>
    <style>
        body {
            font-family: "Georgia", serif;
            color: #000;
            max-width: 720px;
            margin: 30px auto;
            padding: 0 20px;
        }
        h1 { margin-bottom: 4px; }
        .meta { color: #444; font-size: 0.95rem; margin-bottom: 20px; }
        .meta span { margin-right: 18px; }
        .letra {
            font-family: "Consolas", "Courier New", monospace;
            font-size: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
        }
        .barra {
            text-align: center;
            margin-bottom: 24px;
        }
        .barra button {
            font-size: 1rem;
            padding: 10px 22px;
            cursor: pointer;
            border: 1px solid #888;
            border-radius: 8px;
            background: #f5f5f5;
        }
        /* Al imprimir, se oculta el botón. */
        @media print {
            .barra { display: none; }
            body { margin: 0; }
        }
    </style>
</head>
<body>
    <div class="barra">
        <button onclick="window.print()">🖨️ Imprimir / Guardar como PDF</button>
    </div>

    <h1>{{ cancion['titulo'] }}</h1>
    <div class="meta">
        {% if cancion['artista'] %}<span>{{ cancion['artista'] }}</span>{% endif %}
        {% if cancion['tono'] %}<span>Tono: {{ cancion['tono'] }}</span>{% endif %}
    </div>

    <div class="letra">{{ cancion['letra'] }}</div>
</body>
</html>
