name: Despertador de Adoremos

# Mantiene despierto el servidor gratis de Render visitándolo cada ~10 minutos.
on:
  schedule:
    - cron: "*/10 * * * *"   # cada 10 minutos
  workflow_dispatch: {}        # permite ejecutarlo a mano desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visitar la app para que no se duerma
        run: |
          echo "Pingeando Adoremos..."
          curl -s -o /dev/null -w "Respuesta HTTP: %{http_code}\n" https://adoremos.onrender.com/ || true
